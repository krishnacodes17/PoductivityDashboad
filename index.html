    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPulse | Login</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="Finplush_LoginPage.css">
</head>
<body>
 
<div class="container">

    <div class="login-box">

        <div class="logo">
            <i class="fa-solid fa-layer-group"></i>
            <h1>FlowSpace </h1>
            <p>Organize Focus Achieve.</p>
        </div>

        <h2>Welcome Back </h2>
        <p class="subtitle">Login to manage your finances</p>

        <form id="loginForm">

            <div  class="input-box">
                <i class="fa-solid fa-user"></i>
                <input id="username" type="input" placeholder="Enter Username" required>
            </div>

            <div  class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input id="password" type="password" placeholder="Password" required>
            </div>

            

            <button type="submit">
                Login
            </button>

        </form>

        <p class="signup-text">
            Don't have an account?
            <a href="./FinPlush_Signup.html">Create Account</a>
        </p>

    </div>

</div>



<script src="Finplush_LoginPage.js"></script>
</body>
</html>
</body>
</html>
